<div class="auth-container">
    <!-- 🌟 NOUVEAU : Ajout de l'ID "loginGlassBox" et d'un style de protection -->
    <div id="loginGlassBox" class="auth-box glassContainer" style="background: transparent !important; box-shadow: none !important; border: 1px solid rgba(255, 255, 255, 0.2); position: relative; z-index: 0; overflow: hidden;">
        
        <!-- On force tout le contenu au premier plan -->
        <div class="container" style="position: relative; z-index: 1;">
            <h2>Connexion</h2>
            <form id="loginForm">
                <input type="text" id="loginInput" placeholder="Email ou Pseudo" required>
                <input type="password" id="passInput" placeholder="Mot de passe" required>
                <button type="submit" id="loginBtn"">Se connecter</button>
            </form>
            <p id="loginMessage" style="color:red"></p>
        </div>
        
    </div>
    <a class="newAccount" href="#" onclick="router('register')" id="newAccount"">Pas de compte ? S'inscrire</a>
</div>
