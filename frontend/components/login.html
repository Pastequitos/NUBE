<div class="auth-container">
    <div class="auth-box">
        <h2>Connexion</h2>
        <form id="loginForm">
            <input type="text" id="loginInput" placeholder="Email ou Pseudo" required><br>
            <input type="password" id="passInput" placeholder="Mot de passe" required><br>
            <button type="submit" class="btn-discord">Se connecter</button>
        </form>
        <p>Pas de compte ? <a href="#" onclick="router('register')">S'inscrire</a></p>
        <p id="loginMessage" style="color:red"></p>
    </div>
</div>
