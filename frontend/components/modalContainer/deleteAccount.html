<div class="modal-content delete-account-modal" style="backdrop-filter: blur(3px); max-width: 450px;">
    <section class="delete-section" style="padding: 24px; text-align: center;">
        <h2 class="modal-title" style="color: #ff6b6b; margin-bottom: var(--padding); font-weight: bold; font-size: 24px;">Supprimer ton compte ?</h2>
        <p style="color: #e5e5e5; margin-bottom: 24px; font-size: 14px; line-height: 1.6;">
            Cette action est <strong>définitive</strong>. Toutes tes données (messages, serveurs créés, amis) ainsi que tes photos et arrière-plans seront supprimés à tout jamais.
        </p>

        <div class="modal-actions" style="display: flex; gap: var(--padding); width: 100%;">
            <button id="cancelDeleteBtn" class="btn-primary" style="flex: 1; background-color: var(--glass); border: 1px solid var(--glassBorder); border-radius: var(--petitBorderRadius); color: white; padding: 12px; cursor: pointer; transition: background-color 0.2s var(--cubic);">
                Annuler
            </button>
            <button id="confirmDeleteBtn" class="btn-danger" style="flex: 1; background-color: rgba(240, 71, 71, 0.8); border: 1px solid rgba(240, 71, 71, 1); border-radius: var(--petitBorderRadius); color: white; padding: 12px; cursor: pointer; font-weight: bold; transition: background-color 0.2s var(--cubic);">
                Confirmer
            </button>
        </div>
    </section>
</div>
